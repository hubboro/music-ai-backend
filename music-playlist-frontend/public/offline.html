<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f4f0e8" />
    <title>Butterfly Offline</title>
    <style>
      :root {
        color: #1e2d1b;
        background: #f4f0e8;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        min-height: 100svh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: calc(2rem + env(safe-area-inset-top)) 1.5rem calc(2rem + env(safe-area-inset-bottom));
        background:
          radial-gradient(circle at 50% -10%, rgba(205, 221, 200, 0.72), transparent 34rem),
          linear-gradient(165deg, #edf3ea 0%, #f4f0e8 58%, #faf8f3 100%);
        text-align: center;
      }

      main {
        max-width: 22rem;
      }

      img {
        width: 4rem;
        height: 4rem;
        margin-bottom: 2rem;
      }

      h1 {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        font-size: 2.45rem;
        line-height: 0.98;
        font-weight: 600;
      }

      p {
        margin: 1rem 0 0;
        color: #4a6b43;
        font-size: 0.95rem;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/butterfly-logo.png" alt="" />
      <h1>Butterfly needs the internet.</h1>
      <p>Reconnect to create a new soundtrack or open Spotify.</p>
    </main>
  </body>
</html>
